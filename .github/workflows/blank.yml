name: Build APK Payload

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Install Android SDK
      run: |
        sudo apt update
        sudo apt install -y wget unzip aapt android-sdk
        
    - name: Download dx tool
      run: |
        wget https://github.com/izzysoftware/dx/raw/master/dx.jar
        echo '#!/bin/bash' > dx
        echo 'java -jar $PWD/dx.jar "$@"' >> dx
        chmod +x dx
        sudo mv dx /usr/local/bin/
        
    - name: Build APK
      run: |
        # Create directories
        mkdir -p classes
        
        # Compile Java
        javac -d classes -classpath /usr/lib/android-sdk/platforms/android-30/android.jar app/src/main/java/com/rat/payload/*.java
        
        # Convert to DEX
        dx --dex --output=classes.dex classes/
        
        # Create unsigned APK
        aapt package -f -M app/src/main/AndroidManifest.xml -I /usr/lib/android-sdk/platforms/android-30/android.jar -S app/src/main/res -F unsigned.apk app/src/main
        
        # Add classes.dex
        aapt add unsigned.apk classes.dex
        
        # Generate keystore
        keytool -genkey -v -keystore mykey.jks -alias ratkey -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"
        
        # Sign APK
        apksigner sign --ks mykey.jks --ks-pass pass:123456 --key-pass pass:123456 --out payload.apk unsigned.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: payload-apk
        path: payload.apk
